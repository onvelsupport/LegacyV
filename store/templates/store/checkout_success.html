{% extends 'store/base.html' %}

{% block content %}
<div class="success-overlay">
    <div class="success-popup">

        <div class="success-checkmark">
            <div class="check-icon"></div>
        </div>

        <h1>ORDER CONFIRMED</h1>

        <p>
            Thank you for choosing CROWNVII.<br>
            Your order has been successfully received.
        </p>

        <a href="{% url 'home' %}" class="success-btn">
            CONTINUE SHOPPING
        </a>

    </div>
</div>

<style>
.success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.success-popup {
    background: #fff;
    width: 90%;
    max-width: 560px;
    padding: 40px;
    text-align: center;
}

.success-checkmark {
    width: 70px;
    height: 70px;
    border: 3px solid #000;
    border-radius: 50%;
    margin: 0 auto 25px;
    position: relative;
    animation: popIn .4s ease forwards;
}

.check-icon {
    width: 22px;
    height: 40px;
    border-right: 4px solid #000;
    border-bottom: 4px solid #000;
    position: absolute;
    left: 22px;
    top: 8px;
    transform: rotate(45deg) scale(0);
    animation: drawTick .35s ease .35s forwards;
}

.success-popup h1 {
    font-size: 34px;
    margin: 0 0 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.1;
}

.success-popup p {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 30px;
}

.success-btn {
    display: block;
    width: 100%;
    background: #000;
    color: #fff;
    text-decoration: none;
    padding: 20px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    transition: opacity .2s ease;
    box-sizing: border-box;
}

.success-btn:hover {
    opacity: 0.9;
}

@keyframes popIn {
    0% {
        transform: scale(0);
        opacity: 0;
    }

    70% {
        transform: scale(1.15);
        opacity: 1;
    }

    100% {
        transform: scale(1);
        opacity: 1;
    }
}

@keyframes drawTick {
    0% {
        transform: rotate(45deg) scale(0);
    }

    100% {
        transform: rotate(45deg) scale(1);
    }
}

@media (max-width: 768px) {
    .success-popup {
        padding: 35px 25px;
    }

    .success-popup h1 {
        font-size: 28px;
        letter-spacing: 2px;
    }

    .success-popup p {
        font-size: 16px;
    }

    .success-btn {
        font-size: 15px;
    }
}
</style>
{% endblock %}
