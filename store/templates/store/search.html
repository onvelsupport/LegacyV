{% extends 'store/index.html' %}

{% block content %}
<section style="padding:60px 6%; text-align:center;">
  <h1>Search LEGACYV</h1>

  <form method="get" action="{% url 'search' %}">
    <input 
      type="text" 
      name="q" 
      value="{{ query }}" 
      placeholder="Search watches..."
      style="padding:15px; width:300px; max-width:90%;"
    >
    <button type="submit" style="padding:15px 25px;">Search</button>
  </form>
</section>

{{ block.super }}
{% endblock %}
